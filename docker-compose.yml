version: "3.9"
services:
  api:
    build: .
    command: npm run start:prod
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"

  worker:
    build: .
    command: npm run worker:prod
    env_file: .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: whatsapp_saas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
